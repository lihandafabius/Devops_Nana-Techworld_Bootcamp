apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: mysql-java-app-ingress
    
spec:
  ingressClassName: nginx
  rules:
   - host: <YOUR_HOSTNAME>.eu-north-1.elb.amazonaws.com
     http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: java-mysql-app-service
              port:
                number: 8080
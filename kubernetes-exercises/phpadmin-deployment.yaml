apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin

  template:
    metadata:
      labels:
        app: phpmyadmin

    spec:
      containers:
      - name: phpmyadmin
        image: phpmyadmin:latest

        ports:
        - containerPort: 80

        env:
        - name: PMA_HOST
          value: mysql-primary

        - name: PMA_PORT
          value: "3306"

        
---

apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin-service

spec:
  selector:
    app: phpmyadmin

  ports:
  - port: 80
    targetPort: 80

  type: ClusterIP
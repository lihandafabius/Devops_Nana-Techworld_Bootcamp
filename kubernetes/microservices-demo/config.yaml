---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
spec:
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      containers:
      - name: service
        image: gcr.io/google-samples/microservices-demo/emailservice:v0.8.0
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        livenessProbe:
          grpc:  # protocol used for health checks, in this case gRPC but it can be HTTP or TCP
            port: 8080
          periodSeconds: 5 # how often to perform the health check of the container application
        readinessProbe: # used to determine if the container is ready to accept traffic. If the readiness probe fails, the container will be removed from the service endpoints and will not receive traffic until it becomes ready again.
          grpc:
            port: 8080
          periodSeconds: 5
        resources: # used to specify the resource requirements for abuggy container, including CPU and memory limits and requests. This can help ensure that the container has enough resources to run properly and can prevent it from consuming too many resources on the cluster.
          requests: # used to specify the minimum amount of resources that a container needs to run. If the container does not have enough resources to meet these requests, it may be scheduled on a different node or may not be scheduled at all.  
            cpu: 100m
            memory: 64Mi
          limits: # used to specify the maximum amount of resources that a container can use. If the container exceeds these limits, it may be terminated or throttled by the Kubernetes scheduler.
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
spec:
  type: ClusterIP
  selector:
    app: emailservice
  ports:
  - protocol: TCP
    port: 5000
    targetPort: 8080

